<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Patient Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f7fb; padding:30px; }
    .search, .card { background:white; padding:20px; border-radius:12px; margin-bottom:16px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    input { width:100%; padding:10px; }
  </style>
</head>
<body>
  <div class="search">
    <h2>Patient Dashboard - Find Doctor</h2>
    <input value="Sarah" placeholder="Search doctor by name">
  </div>

  <div class="card">
    <h3>Dr. Sarah Khan</h3>
    <p>Speciality: Cardiology</p>
    <p>Available Time: 10:00 AM</p>
  </div>
</body>
</html>
