<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Doctor Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f7fb; padding:30px; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:#eef2ff; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Doctor Dashboard - Patient Appointments</h2>
    <table>
      <tr><th>Patient</th><th>Date</th><th>Time</th><th>Status</th></tr>
      <tr><td>John Smith</td><td>2026-03-12</td><td>09:00</td><td>Booked</td></tr>
      <tr><td>Emily Rose</td><td>2026-03-12</td><td>10:00</td><td>Booked</td></tr>
      <tr><td>Michael Lee</td><td>2026-03-12</td><td>11:00</td><td>Booked</td></tr>
    </table>
  </div>
</body>
</html>
