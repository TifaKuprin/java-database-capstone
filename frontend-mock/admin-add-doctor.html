<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f7fb; padding:30px; }
    .card { background:white; padding:24px; max-width:600px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { background:#16a34a; color:white; border:none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Dashboard - Add Doctor</h2>
    <input value="Dr. Sarah Khan" placeholder="Doctor Name">
    <input value="Cardiology" placeholder="Speciality">
    <input value="sarah@clinic.com" placeholder="Email">
    <input value="+123456789" placeholder="Phone">
    <button>Add Doctor</button>
    <p style="color:green;margin-top:12px;">Doctor added successfully.</p>
  </div>
</body>
</html>
