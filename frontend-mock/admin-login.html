<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Portal Login</title>
  <style>
    body { font-family: Arial; background:#f4f7fb; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:white; padding:30px; width:350px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.1); }
    input, button { width:100%; padding:12px; margin-top:10px; }
    button { background:#2563eb; color:white; border:none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Portal Login</h2>
    <input placeholder="Admin Email">
    <input placeholder="Password" type="password">
    <button>Login</button>
  </div>
</body>
</html>
